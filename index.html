<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同步观影室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HLS.js 用于播放 m3u8 格式视频 -->
    <script src="https://unpkg.com/hls.js@1.4.12/dist/hls.min.js"></script>
    <!-- SimplePeer 用于 WebRTC 通信 -->
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <link rel="icon" href="https://picsum.photos/32/32" type="image/png">
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
        }
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .video-container:hover .controls {
            opacity: 1;
        }
        .chat-message {
            max-width: 80%;
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            border-radius: 8px;
        }
        .chat-message.own {
            background-color: #2563eb;
            align-self: flex-end;
        }
        .chat-message.other {
            background-color: #374151;
            align-self: flex-start;
        }
        .chat-container {
            max-height: 300px;
            overflow-y: auto;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .chat-container {
                max-height: 200px;
            }
            
            .video-container {
                aspect-ratio: 16/9;
            }
            
            nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            
            .grid-cols-1.lg\:grid-cols-3 {
                grid-template-columns: 1fr;
            }
        }
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: #1f2937;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }
        
        /* 动画效果 */
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        /* 加载状态 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        /* 消息提示 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        .toast.show {
            transform: translateX(0);
        }
        .toast.success {
            background-color: #10b981;
        }
        .toast.error {
            background-color: #ef4444;
        }
        .toast.info {
            background-color: #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- 导航栏 -->
    <nav class="bg-gray-800 py-4 px-6 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h1 class="text-2xl font-bold text-white">同步观影室</h1>
        </div>
        <div class="flex items-center space-x-4">
            <div class="flex items-center">
                <span class="mr-2 text-gray-300">房间ID:</span>
                <input type="text" id="roomId" class="bg-gray-700 text-white px-3 py-1 rounded" readonly>
            </div>
            <button id="copyLink" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition-colors">
                复制邀请链接
            </button>
        </div>
    </nav>

    <!-- 消息提示 -->
    <div id="toast" class="toast"></div>

    <!-- 主内容区 -->
    <main class="flex-grow p-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 视频播放区 -->
            <div class="lg:col-span-2">
                <div class="video-container">
                    <video id="videoElement" controls class="w-full h-full"></video>
                    <div class="controls flex items-center space-x-4">
                        <button id="playPause" class="text-white hover:text-blue-400 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </button>
                        <span id="currentTime" class="text-white">0:00</span>
                        <input type="range" id="seekBar" class="flex-grow h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                        <span id="duration" class="text-white">0:00</span>
                        <button id="fullscreen" class="text-white hover:text-blue-400 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3" />
                            </svg>
                        </button>
                    </div>
                    <div id="loadingOverlay" class="loading-overlay hidden">
                        <div class="text-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-blue-500 pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <p class="mt-4 text-white">加载中...</p>
                        </div>
                    </div>
                </div>
                <div class="mt-4 flex space-x-4">
                    <div class="flex-1">
                        <label class="block text-gray-300 mb-2">选择本地视频</label>
                        <input type="file" id="videoFile" accept="video/*" class="w-full text-white">
                    </div>
                    <div class="flex-1">
                        <label class="block text-gray-300 mb-2">或输入视频URL</label>
                        <input type="text" id="videoUrl" placeholder="https://example.com/video.mp4 或 https://example.com/playlist.m3u8" class="w-full bg-gray-700 text-white px-3 py-2 rounded">
                        <button id="loadUrl" class="mt-2 w-full bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded transition-colors">
                            加载视频
                        </button>
                    </div>
                </div>
                <div class="mt-4 bg-gray-800 rounded-lg p-4">
                    <h3 class="text-lg font-semibold mb-2">房间信息</h3>
                    <div class="flex flex-wrap gap-4">
                        <div class="flex items-center">
                            <span class="text-gray-300 mr-2">房间ID:</span>
                            <input type="text" id="roomId" class="bg-gray-700 text-white px-3 py-1 rounded" readonly>
                        </div>
                        <button id="copyLink" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition-colors">
                            复制邀请链接
                        </button>
                        <button id="refreshRoom" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                            刷新房间
                        </button>
                    </div>
                </div>
            </div>

            <!-- 聊天和用户区 -->
            <div class="lg:col-span-1">
                <div class="bg-gray-800 rounded-lg p-4 h-full flex flex-col">
                    <h2 class="text-xl font-bold mb-4 text-center">实时聊天</h2>
                    <div class="chat-container mb-4 flex flex-col" id="chatContainer">
                        <!-- 聊天消息将在这里显示 -->
                    </div>
                    <div class="mt-auto flex">
                        <input type="text" id="messageInput" placeholder="输入消息..." class="flex-1 bg-gray-700 text-white px-3 py-2 rounded-l">
                        <button id="sendMessage" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-r transition-colors">
                            发送
                        </button>
                    </div>
                    <div class="mt-4 border-t border-gray-700 pt-4">
                        <h3 class="text-lg font-semibold mb-2">在线用户</h3>
                        <div id="userList" class="space-y-2">
                            <!-- 用户列表将在这里显示 -->
                        </div>
                        <div class="mt-4">
                            <h4 class="text-md font-semibold mb-2">连接状态</h4>
                            <div id="connectionStatus" class="flex items-center">
                                <div class="w-3 h-3 bg-yellow-500 rounded-full mr-2"></div>
                                <span>连接中...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-gray-800 py-4 px-6 text-center text-gray-400">
        <p>© 2024 同步观影室 - 与朋友一起享受观影时光</p>
    </footer>

    <script>
        // 全局变量
        let video = document.getElementById('videoElement');
        let playPauseBtn = document.getElementById('playPause');
        let seekBar = document.getElementById('seekBar');
        let currentTimeEl = document.getElementById('currentTime');
        let durationEl = document.getElementById('duration');
        let messageInput = document.getElementById('messageInput');
        let sendMessageBtn = document.getElementById('sendMessage');
        let chatContainer = document.getElementById('chatContainer');
        let userList = document.getElementById('userList');
        let roomIdEl = document.getElementById('roomId');
        let copyLinkBtn = document.getElementById('copyLink');
        let videoFileInput = document.getElementById('videoFile');
        let videoUrlInput = document.getElementById('videoUrl');
        let loadUrlBtn = document.getElementById('loadUrl');
        let fullscreenBtn = document.getElementById('fullscreen');
        let loadingOverlay = document.getElementById('loadingOverlay');
        let connectionStatus = document.getElementById('connectionStatus');
        let refreshRoomBtn = document.getElementById('refreshRoom');
        let toast = document.getElementById('toast');

        // WebRTC相关
        let peers = {};
        let userId = Math.random().toString(36).substr(2, 9);
        let roomId = location.hash.substring(1) || Math.random().toString(36).substr(2, 9);
        let isInitiator = !location.hash;
        let socket = null;

        // 设置房间ID
        roomIdEl.value = roomId;
        if (isInitiator) {
            history.pushState(null, null, '#' + roomId);
        }

        // 显示消息提示
        function showToast(message, type = 'info') {
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        // 更新连接状态
        function updateConnectionStatus(status) {
            switch (status) {
                case 'connecting':
                    connectionStatus.innerHTML = '<div class="w-3 h-3 bg-yellow-500 rounded-full mr-2"></div><span>连接中...</span>';
                    break;
                case 'connected':
                    connectionStatus.innerHTML = '<div class="w-3 h-3 bg-green-500 rounded-full mr-2"></div><span>已连接</span>';
                    break;
                case 'disconnected':
                    connectionStatus.innerHTML = '<div class="w-3 h-3 bg-red-500 rounded-full mr-2"></div><span>已断开</span>';
                    break;
            }
        }

        // 连接到信令服务器 (使用更稳定的WebRTC测试服务器)
        function connectToSignalingServer() {
            updateConnectionStatus('connecting');
            socket = new WebSocket('wss://rtc-signaling-server.fly.dev/');

            socket.onopen = function() {
                console.log('连接到信令服务器');
                updateConnectionStatus('connected');
                showToast('信令服务器连接成功', 'success');
                socket.send(JSON.stringify({
                    type: 'join',
                    room: roomId,
                    id: userId
                }));
            };

            socket.onerror = function(error) {
                console.error('信令服务器连接错误:', error);
                updateConnectionStatus('disconnected');
                showToast('信令服务器连接失败，但仍可使用基本视频播放功能', 'error');
            };

            socket.onclose = function() {
                console.log('信令服务器连接关闭');
                updateConnectionStatus('disconnected');
                showToast('信令服务器连接已关闭', 'info');
            };

            socket.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.room !== roomId) return;
                    
                    switch (data.type) {
                        case 'user-joined':
                            if (data.id !== userId) {
                                addUser(data.id);
                                sendChatMessage('系统', `${data.id} 加入了房间`);
                                showToast(`${data.id} 加入了房间`, 'info');
                                
                                // 为新用户创建P2P连接
                                const peer = new SimplePeer({
                                    initiator: true,
                                    trickle: false,
                                    config: {
                                        iceServers: [
                                            { urls: 'stun:stun.l.google.com:19302' },
                                            { urls: 'stun:stun1.l.google.com:19302' }
                                        ]
                                    }
                                });
                                
                                peer.on('signal', function(data) {
                                    socket.send(JSON.stringify({
                                        type: 'signal',
                                        room: roomId,
                                        to: data.id,
                                        from: userId,
                                        signal: data
                                    }));
                                });
                                
                                setupPeerEvents(peer, data.id);
                                peers[data.id] = peer;
                            }
                            break;
                            
                        case 'signal':
                            if (data.to !== userId) return;
                            
                            let peer;
                            if (!peers[data.from]) {
                                peer = new SimplePeer({
                                    initiator: false,
                                    trickle: false,
                                    config: {
                                        iceServers: [
                                            { urls: 'stun:stun.l.google.com:19302' },
                                            { urls: 'stun:stun1.l.google.com:19302' }
                                        ]
                                    }
                                });
                                setupPeerEvents(peer, data.from);
                                peers[data.from] = peer;
                            } else {
                                peer = peers[data.from];
                            }
                            
                            peer.signal(data.signal);
                            break;
                            
                        case 'user-left':
                            removeUser(data.id);
                            sendChatMessage('系统', `${data.id} 离开了房间`);
                            showToast(`${data.id} 离开了房间`, 'info');
                            delete peers[data.id];
                            break;
                    }
                } catch (error) {
                    console.error('处理消息时出错:', error);
                }
            };
        }

        function setupPeerEvents(peer, peerId) {
            peer.on('connect', function() {
                console.log('连接到 peer:', peerId);
                showToast(`已连接到 ${peerId}`, 'success');
            });
            
            peer.on('data', function(data) {
                const message = JSON.parse(data);
                
                switch (message.type) {
                    case 'play':
                        video.play();
                        break;
                    case 'pause':
                        video.pause();
                        break;
                    case 'seek':
                        video.currentTime = message.time;
                        break;
                    case 'chat':
                        sendChatMessage(peerId, message.text);
                        break;
                    case 'video-url':
                        loadVideo(message.url);
                        break;
                }
            });
            
            peer.on('error', function(err) {
                console.error('Peer error:', err);
                showToast(`与 ${peerId} 连接出错`, 'error');
            });
        }

        // 视频控制
        playPauseBtn.addEventListener('click', function() {
            if (video.paused) {
                video.play();
                broadcastMessage({ type: 'play' });
            } else {
                video.pause();
                broadcastMessage({ type: 'pause' });
            }
        });

        video.addEventListener('timeupdate', function() {
            const currentTime = formatTime(video.currentTime);
            const duration = formatTime(video.duration);
            
            currentTimeEl.textContent = currentTime;
            durationEl.textContent = duration;
            seekBar.value = (video.currentTime / video.duration) * 100 || 0;
        });

        video.addEventListener('loadedmetadata', function() {
            durationEl.textContent = formatTime(video.duration);
            loadingOverlay.classList.add('hidden');
        });

        video.addEventListener('playing', function() {
            loadingOverlay.classList.add('hidden');
        });

        video.addEventListener('error', function() {
            loadingOverlay.classList.add('hidden');
            showToast('视频加载失败，请检查视频源', 'error');
        });

        seekBar.addEventListener('input', function() {
            if (isNaN(video.duration)) return;
            const time = (seekBar.value / 100) * video.duration;
            video.currentTime = time;
            broadcastMessage({ type: 'seek', time: time });
        });

        // 全屏功能
        fullscreenBtn.addEventListener('click', function() {
            if (!document.fullscreenElement) {
                document.querySelector('.video-container').requestFullscreen().catch(err => {
                    showToast(`全屏请求失败: ${err.message}`, 'error');
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        // 聊天功能
        sendMessageBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function sendMessage() {
            const text = messageInput.value.trim();
            if (text) {
                sendChatMessage('我', text);
                broadcastMessage({ type: 'chat', text: text });
                messageInput.value = '';
            }
        }

        function sendChatMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${sender === '我' ? 'own' : 'other'}`;
            messageDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 用户管理
        function addUser(userId) {
            const userDiv = document.createElement('div');
            userDiv.className = 'flex items-center space-x-2';
            userDiv.id = `user-${userId}`;
            userDiv.innerHTML = `
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                <span>${userId}</span>
            `;
            userList.appendChild(userDiv);
        }

        function removeUser(userId) {
            const userDiv = document.getElementById(`user-${userId}`);
            if (userDiv) {
                userDiv.remove();
            }
        }

        // 广播消息给所有 peers
        function broadcastMessage(message) {
            for (const peerId in peers) {
                if (peers[peerId].connected) {
                    try {
                        peers[peerId].send(JSON.stringify(message));
                    } catch (error) {
                        console.error('发送消息失败:', error);
                    }
                }
            }
        }

        // 工具函数
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // 复制邀请链接
        copyLinkBtn.addEventListener('click', function() {
            const link = `${window.location.origin}${window.location.pathname}#${roomId}`;
            navigator.clipboard.writeText(link).then(function() {
                showToast('邀请链接已复制到剪贴板！', 'success');
            }).catch(function(err) {
                console.error('复制失败:', err);
                showToast('复制失败，请手动复制链接', 'error');
            });
        });

        // 视频加载
        videoFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                loadVideo(url);
                broadcastMessage({ type: 'video-url', url: url });
            }
        });

        loadUrlBtn.addEventListener('click', function() {
            const url = videoUrlInput.value.trim();
            if (url) {
                loadVideo(url);
                broadcastMessage({ type: 'video-url', url: url });
            } else {
                showToast('请输入视频URL', 'error');
            }
        });

        // 加载视频函数，支持HLS格式
        function loadVideo(url) {
            loadingOverlay.classList.remove('hidden');
            
            // 检查是否是HLS格式
            if (url.indexOf('.m3u8') > -1) {
                // 检查浏览器是否支持HLS
                if (Hls.isSupported()) {
                    // 清除之前的HLS实例
                    if (window.hls) {
                        window.hls.destroy();
                    }
                    // 创建新的HLS实例
                    window.hls = new Hls();
                    // 绑定视频元素
                    window.hls.attachMedia(video);
                    // 加载m3u8文件
                    window.hls.loadSource(url);
                    // 监听错误事件
                    window.hls.on(Hls.Events.ERROR, function(event, data) {
                        console.error('HLS错误:', data);
                        loadingOverlay.classList.add('hidden');
                        showToast('视频加载失败，请检查网络连接或视频URL是否有效', 'error');
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // 对于支持HLS的浏览器（如Safari），直接使用video标签
                    video.src = url;
                } else {
                    loadingOverlay.classList.add('hidden');
                    showToast('您的浏览器不支持HLS格式视频', 'error');
                }
            } else {
                // 普通视频格式直接设置src
                video.src = url;
            }
        }

        // 刷新房间
        refreshRoomBtn.addEventListener('click', function() {
            // 重新连接信令服务器
            if (socket) {
                socket.close();
            }
            connectToSignalingServer();
            showToast('房间已刷新', 'info');
        });

        addUser('我');
